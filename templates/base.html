<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}TLS.INSPECTOR{% endblock %}</title>

  <meta name="description" content="Self-hosted SSL/TLS reconnaissance console. Inspect any HTTPS endpoint, walk the certificate chain, enumerate protocols and ciphers, audit HTTP security headers.">
  <meta name="theme-color" content="#0a0a0f">

  <meta property="og:title" content="TLS.INSPECTOR">
  <meta property="og:description" content="SSL/TLS reconnaissance console for blue teams.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ url_for('static', filename='brand/og-image.png') }}">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" href="{{ url_for('static', filename='brand/favicon.ico') }}" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='brand/favicon-16x16.png') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='brand/favicon-32x32.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='brand/apple-touch-icon.png') }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ url_for('index') }}">
        <img class="brand-icon" src="{{ url_for('static', filename='brand/hex_only.png') }}" alt="">
        <span class="brand-name">TLS.INSPECTOR</span>
      </a>
      <nav class="nav">
        <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">01. SCAN</a>
        <a href="{{ url_for('history') }}" class="{% if request.endpoint == 'history' %}active{% endif %}">02. HISTORY</a>
        <a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}">03. API</a>
      </nav>
      <div class="topbar-actions">
        <span class="ver-pill">v2.0-STABLE</span>
      </div>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="footer-inner">
      <span>MIT LICENSE // &copy; 2026 TLS.INSPECTOR</span>
      <div class="footer-stack">
        <span>Python</span>
        <span>Flask</span>
        <span>OpenSSL</span>
        <span>Cryptography</span>
      </div>
      <span>BUILT FOR BLUE TEAMS</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
